<!DOCTYPE html>
<html>
<head>
    <title>Lab Booking Success</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #4facfe, #43e97b);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            animation: fadeIn 0.5s ease-in-out;
        }

        .title {
            color: #28a745;
            font-weight: bold;
        }

        .details {
            text-align: left;
            margin-top: 20px;
        }

        .details p {
            margin: 6px 0;
            font-size: 15px;
        }

        .btn-custom {
            border-radius: 10px;
            padding: 10px;
            font-weight: bold;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-custom:hover {
            transform: scale(1.05);
        }

        .btn-print {
            background: #0d6efd;
            color: white;
        }

        .btn-logout {
            background: #dc3545;
            color: white;
        }

        .btn-home {
            background: linear-gradient(90deg, #4facfe, #43e97b);
            color: white;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 🖨️ Print clean view */
        @media print {
            body {
                background: white !important;
            }

            .btn-custom, a {
                display: none !important;
            }

            .card-box {
                box-shadow: none !important;
            }
        }
    </style>
</head>

<body>

<div class="card-box">

    <h2 class="title">✅ Lab Booked Successfully!</h2>
    <p class="text-muted">📋 Lab Booking Details</p>
    <hr>

    <div class="details">
        <p><b>👨‍🏫 Teacher:</b> {{ booking.teacher_name }}</p>
        <p><b>🏫 Lab:</b> {{ booking.lab }}</p>
        <p><b>📅 Date:</b> {{ booking.date }}</p>
        <p><b>⏰ Time:</b> {{ booking.time }} - {{ booking.end_time }}</p>
        <p><b>⏳ Duration:</b> {{ booking.duration }} hour(s)</p>
    </div>

    <!-- 🖨 PRINT -->
    <button onclick="window.print()" class="btn btn-print btn-custom w-100">
        🖨 Print
    </button>

    <!-- 🏠 HOME -->
    <a href="/home/" class="btn btn-home btn-custom w-100">
        🏠 Back to Home
    </a>

    <!-- 🚪 LOGOUT -->
    <a href="/logout/" class="btn btn-logout btn-custom w-100">
        🚪 Logout
    </a>

</div>

</body>
</html>
